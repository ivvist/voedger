name: CI changes in pkg/istorage

on:
  push:
    paths:
      - 'pkg/istorage/**'
  pull_request:
    paths:
      - 'pkg/istorage/**'

jobs:
  determine_changes:
    runs-on: ubuntu-22.04
    outputs:
      cas_changed: ${{ steps.filter.outputs.cas }}
      amazon_changed: ${{ steps.filter.outputs.amazon }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check modified files
        id: filter
        run: |
          # Determine the previous commit
          BEFORE_COMMIT=${{ github.event.before }}

          # If BEFORE_COMMIT is empty or invalid, use the first parent commit as fallback
          if [ -z "$BEFORE_COMMIT" ] || ! git cat-file -e "$BEFORE_COMMIT^{commit}" 2>/dev/null; then
            BEFORE_COMMIT=$(git rev-parse --verify HEAD~1 2>/dev/null || echo "")
          fi

          # If still empty, it means this is the first commit (e.g., brand-new repo or first push)
          if [ -z "$BEFORE_COMMIT" ]; then
            echo "No previous commit found. Using HEAD."
            BEFORE_COMMIT=${{ github.sha }}
          fi

          echo "Comparing changes from $BEFORE_COMMIT to ${{ github.sha }}"

          # Get changed files
          CHANGED_FILES=$(git diff --name-only $BEFORE_COMMIT ${{ github.sha }})
          echo "Changed files: $CHANGED_FILES"

          # Check for relevant file changes
          CAS=false
          AMAZON=false

          if echo "$CHANGED_FILES" | grep -q '^pkg/istorage/cas/'; then
            CAS=true
          fi

          if echo "$CHANGED_FILES" | grep -q '^pkg/istorage/amazondb/'; then
            AMAZON=true
          fi

          echo "cas=$CAS" >> $GITHUB_ENV
          echo "amazon=$AMAZON" >> $GITHUB_ENV

          echo "cas=$CAS" >> $GITHUB_OUTPUT
          echo "amazon=$AMAZON" >> $GITHUB_OUTPUT

  trigger_cas:
    needs: determine_changes
    if: needs.determine_changes.outputs.cas_changed == 'true'
    uses: ./.github/workflows/ci_cas.yml
    secrets:
      personaltoken: ${{ secrets.REPOREADING_TOKEN }}

  trigger_amazon:
    needs: determine_changes
    if: needs.determine_changes.outputs.amazon_changed == 'true'
    uses: ./.github/workflows/ci_amazon.yml
    secrets:
      personaltoken: ${{ secrets.REPOREADING_TOKEN }}
